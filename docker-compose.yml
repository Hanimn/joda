# joda — full local stack: web + worker + redis + minio (S3-compatible).
# Bring up with:  docker compose up --build
#
# The web UI is on http://localhost:8000, minio console on http://localhost:9001
# (user/pass: minioadmin/minioadmin). Stems are served to the browser via
# presigned URLs pointing at the minio endpoint.

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot: create the bucket, then exit.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/joda &&
      echo 'bucket ready'
      "

  web:
    build: .
    command: ["web"]
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: &joda_env
      JODA_REDIS_URL: redis://redis:6379/0
      JODA_STORAGE_BACKEND: s3
      JODA_S3_ENDPOINT_URL: http://minio:9000
      JODA_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      JODA_S3_BUCKET: joda
      JODA_S3_ACCESS_KEY: minioadmin
      JODA_S3_SECRET_KEY: minioadmin
      JODA_ENVIRONMENT: docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build: .
    command: ["worker"]
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *joda_env
    # Scale workers with:  docker compose up --scale worker=3
    deploy:
      replicas: 1

volumes:
  minio-data:
