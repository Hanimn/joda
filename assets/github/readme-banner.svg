<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1c21"/>
      <stop offset="100%" stop-color="#24262d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-grad)"/>

  <!-- Decorative stem track lines (background) -->
  <g opacity="0.06">
    <rect x="-100" y="100" width="500" height="16" rx="4" fill="#f0f0f0"/>
    <rect x="-50" y="130" width="600" height="16" rx="4" fill="#f0f0f0"/>
    <rect x="-80" y="160" width="450" height="16" rx="4" fill="#f0f0f0"/>
    <rect x="880" y="440" width="500" height="16" rx="4" fill="#f0f0f0"/>
    <rect x="830" y="470" width="550" height="16" rx="4" fill="#f0f0f0"/>
    <rect x="900" y="500" width="480" height="16" rx="4" fill="#f0f0f0"/>
  </g>

  <!-- Stem color accents (decorative bars) -->
  <g transform="translate(100, 520)">
    <rect x="0" y="0" width="80" height="8" rx="4" fill="#e07b6b"/>
    <rect x="100" y="0" width="80" height="8" rx="4" fill="#d4a84d"/>
    <rect x="200" y="0" width="80" height="8" rx="4" fill="#9b7ec7"/>
    <rect x="300" y="0" width="80" height="8" rx="4" fill="#6ba86b"/>
    <rect x="400" y="0" width="80" height="8" rx="4" fill="#6b9dd4"/>
    <rect x="500" y="0" width="80" height="8" rx="4" fill="#7a7d85"/>
  </g>

  <!-- Main content -->
  <g transform="translate(100, 220)">
    <!-- Logo icon -->
    <g fill="#f0f0f0">
      <rect x="12" y="0" width="96" height="20" rx="4"/>
      <rect x="0" y="32" width="120" height="20" rx="4" opacity="0.6"/>
      <rect x="0" y="64" width="120" height="20" rx="4" opacity="0.4"/>
      <rect x="0" y="96" width="120" height="20" rx="4" opacity="0.25"/>
    </g>

    <!-- Logo text -->
    <text x="160" y="90" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="96" font-weight="600" fill="#f0f0f0" letter-spacing="-0.02em">joda</text>
  </g>

  <!-- Tagline -->
  <text x="100" y="380" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="32" fill="#7a7d85">Separate vocals, drums, bass, guitar, piano, and more</text>

  <!-- Accent stripe -->
  <rect x="1200" y="0" width="80" height="640" fill="#2dd4bf" opacity="0.12"/>
</svg>
