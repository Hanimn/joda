<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <!-- Stem separation diagram for README -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1c21"/>
      <stop offset="100%" stop-color="#24262d"/>
    </linearGradient>
  </defs>

  <rect width="800" height="320" fill="url(#bg)" rx="12"/>

  <!-- Input: Audio file -->
  <g transform="translate(40, 100)">
    <rect width="140" height="120" rx="8" fill="#24262d" stroke="#36383f" stroke-width="1"/>
    <text x="70" y="50" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#7a7d85" text-anchor="middle">INPUT</text>

    <!-- Waveform representation -->
    <g transform="translate(20, 60)">
      <rect x="0" y="10" width="100" height="4" rx="2" fill="#f0f0f0" opacity="0.8"/>
      <rect x="10" y="5" width="80" height="14" rx="2" fill="#f0f0f0" opacity="0.5"/>
      <rect x="5" y="8" width="90" height="8" rx="2" fill="#f0f0f0" opacity="0.3"/>
    </g>

    <text x="70" y="105" font-family="JetBrains Mono, monospace" font-size="11" fill="#f0f0f0" text-anchor="middle">song.mp3</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(200, 150)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#2dd4bf" stroke-width="2"/>
    <polygon points="60,-6 72,0 60,6" fill="#2dd4bf"/>
    <text x="36" y="-12" font-family="Inter, sans-serif" font-size="11" fill="#2dd4bf" text-anchor="middle">joda</text>
  </g>

  <!-- Output: 6 stems -->
  <g transform="translate(300, 40)">
    <!-- Vocals -->
    <g transform="translate(0, 0)">
      <rect width="220" height="36" rx="6" fill="#24262d" stroke="#36383f" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="36" rx="2" fill="#e07b6b"/>
      <text x="20" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#f0f0f0">Vocals</text>
      <text x="200" y="23" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7d85" text-anchor="end">vocals.wav</text>
    </g>

    <!-- Drums -->
    <g transform="translate(0, 44)">
      <rect width="220" height="36" rx="6" fill="#24262d" stroke="#36383f" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="36" rx="2" fill="#d4a84d"/>
      <text x="20" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#f0f0f0">Drums</text>
      <text x="200" y="23" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7d85" text-anchor="end">drums.wav</text>
    </g>

    <!-- Bass -->
    <g transform="translate(0, 88)">
      <rect width="220" height="36" rx="6" fill="#24262d" stroke="#36383f" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="36" rx="2" fill="#9b7ec7"/>
      <text x="20" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#f0f0f0">Bass</text>
      <text x="200" y="23" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7d85" text-anchor="end">bass.wav</text>
    </g>

    <!-- Guitar -->
    <g transform="translate(0, 132)">
      <rect width="220" height="36" rx="6" fill="#24262d" stroke="#36383f" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="36" rx="2" fill="#6ba86b"/>
      <text x="20" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#f0f0f0">Guitar</text>
      <text x="200" y="23" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7d85" text-anchor="end">guitar.wav</text>
    </g>

    <!-- Piano -->
    <g transform="translate(0, 176)">
      <rect width="220" height="36" rx="6" fill="#24262d" stroke="#36383f" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="36" rx="2" fill="#6b9dd4"/>
      <text x="20" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#f0f0f0">Piano</text>
      <text x="200" y="23" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7d85" text-anchor="end">piano.wav</text>
    </g>

    <!-- Other -->
    <g transform="translate(0, 220)">
      <rect width="220" height="36" rx="6" fill="#24262d" stroke="#36383f" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="36" rx="2" fill="#7a7d85"/>
      <text x="20" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#f0f0f0">Other</text>
      <text x="200" y="23" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7d85" text-anchor="end">other.wav</text>
    </g>
  </g>

  <!-- Output label -->
  <text x="560" y="30" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#7a7d85" text-anchor="middle">OUTPUT · 6 STEMS</text>
</svg>
